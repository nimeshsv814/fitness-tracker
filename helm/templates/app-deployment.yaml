apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-tracker-app
  namespace: nimesh-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness-tracker-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fitness-tracker-app
    spec:
      containers:
        - name: fitness-tracker-app
          image: nimeshsv814/fitness-application:6777f41cd9f372580945adc0503f30c1c345f4fa
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "255Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          env:
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: MONGODB_URI
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: PORT
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: HOST
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: NODE_ENV
            # Datadog APM (tracing) env variables
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_ENV
              value: "production"
            - name: DD_SERVICE
              value: "fitness-tracker-app"
            - name: DD_VERSION
              value: "1.0.0"
---

apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
  namespace: nimesh-ns
spec:
  selector:
    app: fitness-tracker-app
  ports:
  - port: 80
    targetPort: 5000
  type: ClusterIP